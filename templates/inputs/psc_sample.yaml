# Sample PSC Cost Recovery input (YAML)
# Use with: fiscal_model load --input psc_sample.yaml

name: "Sample PSC Case Study"
version: "1.0"
client: "PT Reka Elang Inovasi"

production:
  vectors:
    years: [2026, 2027, 2028, 2029, 2030]
    rates_bopd: [5000, 8000, 10000, 8500, 6000]
  source_description: "Sample 5-year field profile"

price:
  oil_price_usd_bbl: 75.0
  escalation_mode: flat
  escalation_pct: 0.0

capex:
  items:
    - category: "Drilling"
      cost_usd: 5000000
      year_incurred: 2026
      depreciation_life_years: 5
    - category: "Facility"
      cost_usd: 8000000
      year_incurred: 2026
      depreciation_life_years: 10
  description: "Initial development capex"
  contingency_pct: 10.0

opex:
  years: [2026, 2027, 2028, 2029, 2030]
  categories:
    production: [1200000, 1500000, 1800000, 1600000, 1300000]
    maintenance: [500000, 600000, 700000, 750000, 800000]
    labor: [300000, 300000, 300000, 300000, 300000]

ftp_pct: 0.20
ftp_contractor_split: 0.50
cost_recovery_ceiling_pct: 0.80
cost_recovery_depreciation_life_years: 5.0
contractor_split_after_cr: 0.35
investment_credit_pct: 0.05
tax_rate_pct: 0.22
dmo_pct: 0.25
dmo_fee_usd_bbl: 0.50
discount_rate_pct: 0.10
notes: "Sample for documentation"
